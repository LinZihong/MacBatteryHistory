<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Battery History</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1ea;
        --panel: #fffdf9;
        --ink: #1e2328;
        --muted: #687078;
        --line: #ddd5c8;
        --good: #67c46a;
        --low: #d0a326;
        --usage: #3d7ff0;
        --charge: #67c46a;
        --warn: #9a4b12;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px 40px;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: end;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 30px;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 20px;
      }

      .muted {
        color: var(--muted);
      }

      .section-note {
        margin: -8px 0 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .metric,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .metric {
        padding: 14px 16px;
      }

      .metric-label {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 6px;
      }

      .metric-value {
        font-size: 26px;
        font-weight: 650;
      }

      .panel {
        padding: 18px;
        margin-bottom: 16px;
      }

      .chart-panel {
        position: relative;
      }

      .chart {
        width: 100%;
        height: 320px;
        display: block;
      }

      .grid-line {
        stroke: var(--line);
        stroke-width: 1;
      }

      .grid-line.vertical {
        stroke-dasharray: 4 4;
      }

      .axis-label {
        fill: var(--muted);
        font-size: 12px;
      }

      .battery-bar {
        cursor: default;
      }

      .usage-bar {
        fill: var(--usage);
        cursor: default;
      }

      .charge-bar {
        fill: var(--charge);
        cursor: default;
      }

      .tooltip {
        position: absolute;
        z-index: 2;
        min-width: 78px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 8px 24px rgba(30, 35, 40, 0.14);
        pointer-events: none;
        transform: translate(-50%, calc(-100% - 12px));
        opacity: 0;
        transition: opacity 120ms ease;
      }

      .tooltip.visible {
        opacity: 1;
      }

      .tooltip-value {
        font-weight: 650;
      }

      .tooltip-time {
        color: var(--muted);
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      th,
      td {
        text-align: left;
        padding: 10px 8px;
        border-bottom: 1px solid var(--line);
      }

      th {
        color: var(--muted);
        font-weight: 600;
      }

      .stale {
        color: var(--warn);
      }

      @media (max-width: 760px) {
        header {
          display: block;
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Battery History</h1>
          <div class="muted" id="window"></div>
        </div>
        <div class="muted" id="generated"></div>
      </header>

      <section class="summary">
        <div class="metric">
          <div class="metric-label">Current battery</div>
          <div class="metric-value" id="current"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Window change</div>
          <div class="metric-value" id="change"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Recorded events</div>
          <div class="metric-value" id="events"></div>
        </div>
        <div class="metric">
          <div class="metric-label">Rendered cadence</div>
          <div class="metric-value" id="cadence"></div>
        </div>
      </section>

      <section class="panel chart-panel">
        <h2>Battery Level</h2>
        <svg class="chart" id="chart" viewBox="0 0 1000 320" role="img" aria-label="Battery chart"></svg>
        <div class="tooltip" id="tooltip">
          <div class="tooltip-value"></div>
          <div class="tooltip-time"></div>
        </div>
      </section>

      <section class="panel chart-panel">
        <h2>Power Usage</h2>
        <p class="section-note">Estimated discharge per 30 minutes; charging is shown separately in green</p>
        <svg class="chart usage-chart" id="usage-chart" viewBox="0 0 1000 220" role="img" aria-label="Power usage chart"></svg>
        <div class="tooltip" id="usage-tooltip">
          <div class="tooltip-value"></div>
          <div class="tooltip-time"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Charge changes</h2>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Battery</th>
            </tr>
          </thead>
          <tbody id="changes"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Regularized samples</h2>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Battery</th>
              <th>Last observed</th>
            </tr>
          </thead>
          <tbody id="samples"></tbody>
        </table>
      </section>
    </main>

    <script src="data.js"></script>
    <script>
      const data = window.BATTERY_HISTORY;
      const fmt = new Intl.DateTimeFormat([], { hour: "2-digit", minute: "2-digit" });
      const fullFmt = new Intl.DateTimeFormat([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });

      const samples = data.samples;
      if (!samples.length) {
        document.body.innerHTML = `
          <main>
            <section class="panel">
              <h1>Battery History</h1>
              <p class="muted">No generated data yet. Run <code>./refresh_battery_history.py</code> and reload this page.</p>
            </section>
          </main>
        `;
        throw new Error("No battery history data generated yet.");
      }
      const first = samples[0];
      const last = samples[samples.length - 1];
      const live = data.liveBattery;
      const delta = last.percentage - first.percentage;

      document.querySelector("#window").textContent =
        `${fullFmt.format(new Date(data.windowStart))} to ${fullFmt.format(new Date(data.windowEnd))}`;
      document.querySelector("#generated").textContent =
        `Generated ${fullFmt.format(new Date(data.generatedAt))}`;
      document.querySelector("#current").textContent =
        live ? `${live.percentage}%` : `${last.percentage}%`;
      document.querySelector("#change").textContent =
        `${delta > 0 ? "+" : ""}${delta}%`;
      document.querySelector("#events").textContent = data.sampleCount;
      document.querySelector("#cadence").textContent = `${data.intervalMinutes} min`;

      const changeRows = data.changePoints.map((point) => `
        <tr>
          <td>${fullFmt.format(new Date(point.time))}</td>
          <td>${point.percentage}%</td>
        </tr>
      `).join("");
      document.querySelector("#changes").innerHTML = changeRows;

      const sampleRows = samples.map((sample) => {
        const stale = sample.minutesSinceObservation >= data.intervalMinutes * 2;
        return `
          <tr>
            <td>${fmt.format(new Date(sample.time))}</td>
            <td>${sample.percentage}%</td>
            <td class="${stale ? "stale" : ""}">
              ${fmt.format(new Date(sample.observedAt))}
              ${sample.minutesSinceObservation ? `(${sample.minutesSinceObservation} min earlier)` : ""}
            </td>
          </tr>
        `;
      }).join("");
      document.querySelector("#samples").innerHTML = sampleRows;

      const svg = document.querySelector("#chart");
      const tooltip = document.querySelector("#tooltip");
      const tooltipValue = tooltip.querySelector(".tooltip-value");
      const tooltipTime = tooltip.querySelector(".tooltip-time");
      const width = 1000;
      const height = 320;
      const pad = { top: 18, right: 42, bottom: 34, left: 20 };
      const min = 0;
      const max = 100;
      const x = (index) =>
        pad.left + (index / Math.max(samples.length - 1, 1)) * (width - pad.left - pad.right);
      const y = (value) =>
        pad.top + ((max - value) / Math.max(max - min, 1)) * (height - pad.top - pad.bottom);

      const path = samples
        .map((sample, index) => `${index === 0 ? "M" : "L"} ${x(index)} ${y(sample.percentage)}`)
        .join(" ");
      const ticks = [];
      for (const value of [0, 20, 40, 60, 80, 100]) {
        ticks.push(`
          <line class="grid-line" x1="${pad.left}" y1="${y(value)}" x2="${width - pad.right}" y2="${y(value)}"></line>
          <text class="axis-label" x="${width - pad.right + 8}" y="${y(value) + 4}">${value}%</text>
        `);
      }

      const labelStep = Math.max(Math.floor(samples.length / 6), 1);
      const timeMarks = samples
        .filter((_, index) => index % labelStep === 0)
        .map((sample) => {
          const originalIndex = samples.indexOf(sample);
          return `
            <line class="grid-line vertical" x1="${x(originalIndex)}" y1="${pad.top}" x2="${x(originalIndex)}" y2="${height - pad.bottom}"></line>
            <text class="axis-label" x="${x(originalIndex)}" y="${height - 10}" text-anchor="middle">${fmt.format(new Date(sample.time))}</text>
          `;
        })
        .join("");

      const barWidth = Math.max(
        ((width - pad.left - pad.right) / Math.max(samples.length, 1)) * 0.82,
        5
      );
      const bars = samples
        .map((sample, index) => {
          const left = x(index) - barWidth / 2;
          const top = y(sample.percentage);
          return `
            <rect
              class="battery-bar"
              data-index="${index}"
              x="${left}"
              y="${top}"
              width="${barWidth}"
              height="${height - pad.bottom - top}"
              rx="${Math.min(barWidth / 2, 4)}"
              fill="${sample.percentage <= 20 ? "var(--low)" : "var(--good)"}"
            ></rect>
          `;
        })
        .join("");

      svg.innerHTML = `
        ${ticks.join("")}
        ${timeMarks}
        ${bars}
      `;

      svg.querySelectorAll(".battery-bar").forEach((bar) => {
        bar.addEventListener("mouseenter", () => {
          const sample = samples[Number(bar.dataset.index)];
          const svgRect = svg.getBoundingClientRect();
          const panelRect = svg.parentElement.getBoundingClientRect();
          const pointX =
            ((Number(bar.getAttribute("x")) + Number(bar.getAttribute("width")) / 2) / width) *
            svgRect.width;
          const pointY = (Number(bar.getAttribute("y")) / height) * svgRect.height;
          tooltip.style.left = `${pointX + svgRect.left - panelRect.left}px`;
          tooltip.style.top = `${pointY}px`;
          tooltipValue.textContent = `${sample.percentage}%`;
          tooltipTime.textContent =
            `${fullFmt.format(new Date(sample.time))} · observed ${fmt.format(new Date(sample.observedAt))}`;
          tooltip.classList.add("visible");
        });
        bar.addEventListener("mouseleave", () => {
          tooltip.classList.remove("visible");
        });
      });

      const usageBuckets = data.powerUsageBuckets || [];
      const usageSvg = document.querySelector("#usage-chart");
      const usageTooltip = document.querySelector("#usage-tooltip");
      const usageTooltipValue = usageTooltip.querySelector(".tooltip-value");
      const usageTooltipTime = usageTooltip.querySelector(".tooltip-time");
      const usageHeight = 220;
      const usagePad = { top: 18, right: 42, bottom: 34, left: 20 };
      const usageObservedMax = Math.max(
        1,
        ...usageBuckets.map((bucket) =>
          Math.max(bucket.dropPercentagePoints, bucket.chargeGainPercentagePoints || 0)
        )
      );
      const usageMax = Math.max(usageObservedMax, 1);
      const usageX = (index) =>
        usagePad.left + (index / Math.max(usageBuckets.length, 1)) * (width - usagePad.left - usagePad.right);
      const usageBarWidth =
        ((width - usagePad.left - usagePad.right) / Math.max(usageBuckets.length, 1)) * 0.42;
      const usageY = (value) =>
        usagePad.top + ((usageMax - value) / usageMax) * (usageHeight - usagePad.top - usagePad.bottom);

      const usageTicks = [0, usageMax / 2, usageMax].map((value) => `
        <line class="grid-line" x1="${usagePad.left}" y1="${usageY(value)}" x2="${width - usagePad.right}" y2="${usageY(value)}"></line>
        <text class="axis-label" x="${width - usagePad.right + 8}" y="${usageY(value) + 4}">${Number.isInteger(value) ? value : value.toFixed(1)}pp</text>
      `).join("");

      const usageBars = usageBuckets.map((bucket, index) => {
        const left = usageX(index) + usageBarWidth * 0.7;
        const value = bucket.dropPercentagePoints || bucket.chargeGainPercentagePoints || 0;
        const top = usageY(value);
        const heightValue = usageHeight - usagePad.bottom - top;
        const className = bucket.chargeGainPercentagePoints ? "charge-bar" : "usage-bar";
        return `
          <rect
            class="${className}"
            data-index="${index}"
            x="${left}"
            y="${top}"
            width="${usageBarWidth}"
            height="${Math.max(heightValue, 0)}"
            rx="3"
          ></rect>
        `;
      }).join("");

      const usageLabels = usageBuckets
        .filter((_, index) => index % Math.max(Math.floor(usageBuckets.length / 6), 1) === 0)
        .map((bucket) => {
          const originalIndex = usageBuckets.indexOf(bucket);
          return `
            <line class="grid-line vertical" x1="${usageX(originalIndex) + usageBarWidth * 1.2}" y1="${usagePad.top}" x2="${usageX(originalIndex) + usageBarWidth * 1.2}" y2="${usageHeight - usagePad.bottom}"></line>
            <text class="axis-label" x="${usageX(originalIndex) + usageBarWidth * 1.2}" y="${usageHeight - 10}" text-anchor="middle">${fmt.format(new Date(bucket.time))}</text>
          `;
        })
        .join("");

      usageSvg.innerHTML = `
        ${usageTicks}
        ${usageBars}
        ${usageLabels}
      `;

      usageSvg.querySelectorAll(".usage-bar, .charge-bar").forEach((bar) => {
        bar.addEventListener("mouseenter", () => {
          const bucket = usageBuckets[Number(bar.dataset.index)];
          const svgRect = usageSvg.getBoundingClientRect();
          const panelRect = usageSvg.parentElement.getBoundingClientRect();
          const centerX =
            ((Number(bar.getAttribute("x")) + Number(bar.getAttribute("width")) / 2) / width) *
            svgRect.width;
          const topY = (Number(bar.getAttribute("y")) / usageHeight) * svgRect.height;
          usageTooltip.style.left = `${centerX + svgRect.left - panelRect.left}px`;
          usageTooltip.style.top = `${topY}px`;
          usageTooltipValue.textContent = bucket.chargeGainPercentagePoints
            ? `+${bucket.chargeGainPercentagePoints} pp charging`
            : `${bucket.dropPercentagePoints} pp discharge`;
          usageTooltipTime.textContent =
            `${fmt.format(new Date(bucket.time))} to ${fmt.format(new Date(new Date(bucket.time).getTime() + 30 * 60 * 1000))}`;
          usageTooltip.classList.add("visible");
        });
        bar.addEventListener("mouseleave", () => {
          usageTooltip.classList.remove("visible");
        });
      });
    </script>
  </body>
</html>
